apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: db-law-ai-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kunalm-1810/manifest-conifg-k8s-law-ai.git    # Repo containing deployment app manifests
    targetRevision: main
    path: k8s-manifest-config/mongo                                  # path of  app manifests in the repo
  destination:
    server: https://172.31.8.65:33893
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  