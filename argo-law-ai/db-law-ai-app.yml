apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: db-law-ai-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kunalm-1810/k8s-arcgocd-config-repo.git
    targetRevision: main
    path: ansible-helm/Infra/k8s/mongo
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  