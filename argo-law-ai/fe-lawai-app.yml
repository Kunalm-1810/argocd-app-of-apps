apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fe-law-ai-app         #child app name
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kunalm-1810/manifest-conifg-k8s-law-ai.git    # Repo containing deployment app manifests
    targetRevision: main
    path: k8s-manifest-config/frontend                                 # path of  app manifests in the repo
  destination:
    server: https://kubernetes.default.svc                  # cluster URL of the k8s cluster where the app will be deployed
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
  