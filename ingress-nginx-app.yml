apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Kunalm-1810/manifest-conifg-k8s-law-ai.git
    chart: ingress-nginx
    targetRevision: main
  destination:
    server: https://172.31.8.65:33893 
    namespace: ingress-nginx
  syncPolicy: 
    automated:
      prune: true
      selfHeal: true
    syncOptions:  
      - CreateNamespace=true