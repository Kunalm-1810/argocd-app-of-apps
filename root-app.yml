apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app-law-ai  #root app name
  namespace: argocd     #argocd namespace where root app will be created
spec:
  project: default      # Can also assign to a Project if needed
  source:
    repoURL: https://github.com/Kunalm-1810/argocd-demo.git      # Repo containing child apps
    targetRevision: main        # Git branch to track
    path: argo-law-ai                       # Path where child app manifests are stored
  destination:
    server: 'https://kubernetes.default.svc'      # Deploying inside the same cluster
    namespace: argocd                             # Applications (CRDs) must live in argocd namespace
  syncPolicy:
    automated:
      prune: true                                # Prune removed child apps
      selfHeal: true                              # Auto-fix drift